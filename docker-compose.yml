
services:
  postgres:
    image: postgres:15-alpine
    container_name: logitrack-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: MySecretPassword123
      POSTGRES_DB: logitrack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: